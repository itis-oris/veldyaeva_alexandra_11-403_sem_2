databaseChangeLog:
  - changeSet:
      id: 20260516-create-notification
      author: adveldyaeva
      changes:
        - createTable:
            tableName: notification
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: type
                  type: VARCHAR(100)
                  constraints:
                    nullable: true

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

              - column:
                  name: body
                  type: TEXT
                  constraints:
                    nullable: true

              - column:
                  name: created
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false