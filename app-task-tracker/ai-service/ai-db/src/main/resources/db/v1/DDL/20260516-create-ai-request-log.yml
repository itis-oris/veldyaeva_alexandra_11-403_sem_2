databaseChangeLog:
  - changeSet:
      id: 20260516-create-ai-request-log
      author: adveldyaeva
      changes:
        - createTable:
            tableName: ai_request_log
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: request_payload
                  type: TEXT
              - column:
                  name: response_payload
                  type: TEXT
              - column:
                  name: tokens
                  type: INTEGER
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
              - column:
                  name: status
                  type: VARCHAR(32)